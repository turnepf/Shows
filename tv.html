<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CP9N26NG19"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-CP9N26NG19');</script>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Show Picker Club TV</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      overflow: hidden;
      height: 100vh;
      padding: 48px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 42px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .tabs {
      display: flex;
      gap: 8px;
    }

    .tab {
      padding: 12px 32px;
      font-size: 28px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      border: 2px solid transparent;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.15s;
      outline: none;
    }

    .tab.active {
      color: #fff;
      border-bottom-color: #E67E22;
    }

    .tab.focused {
      background: rgba(230, 126, 34, 0.2);
      border-color: #E67E22;
      color: #fff;
    }

    .show-list {
      height: calc(100vh - 200px);
      overflow-y: auto;
      scrollbar-width: none;
    }
    .show-list::-webkit-scrollbar { display: none; }

    .show-row {
      display: flex;
      align-items: center;
      padding: 18px 24px;
      border-left: 4px solid transparent;
      border-radius: 8px;
      transition: all 0.12s;
      min-height: 68px;
    }

    .show-row.focused {
      background: rgba(230, 126, 34, 0.15);
      border-left-color: #E67E22;
    }

    .show-title {
      font-size: 30px;
      font-weight: 500;
      color: #fff;
      flex-shrink: 1;
    }

    .show-movie {
      font-size: 22px;
      font-weight: 400;
      color: #7f8c8d;
    }

    .show-meta {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-left: auto;
      padding-left: 24px;
      flex-shrink: 0;
    }

    .show-rating {
      font-size: 24px;
      color: #bbb;
    }

    .star {
      color: #f1c40f;
      margin-right: 4px;
    }

    .show-network {
      font-size: 24px;
      color: #5dade2;
    }

    .show-via {
      font-size: 22px;
      color: #bb8fce;
      font-style: italic;
    }

    .show-from {
      font-size: 22px;
      color: #7f8c8d;
    }

    .show-notes {
      font-size: 20px;
      color: #7f8c8d;
      font-style: italic;
    }

    .series-badge { font-size: 22px; }

    .count-bar {
      position: fixed;
      bottom: 48px;
      left: 48px;
      right: 48px;
      text-align: center;
      font-size: 22px;
      color: rgba(255,255,255,0.3);
    }

    .empty {
      text-align: center;
      font-size: 32px;
      color: rgba(255,255,255,0.3);
      padding-top: 120px;
    }

    /* Member picker */
    .picker {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .picker h1 { margin-bottom: 48px; font-size: 52px; }

    .picker-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .picker-item {
      padding: 24px 64px;
      font-size: 36px;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      text-align: center;
      transition: all 0.15s;
      cursor: pointer;
    }

    .picker-item.focused {
      background: rgba(230, 126, 34, 0.2);
      border-color: #E67E22;
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const TABS = [
      { key: 'watching', label: 'Watching' },
      { key: 'waiting', label: 'Waiting' },
      { key: 'recommending', label: 'Recommending' },
      { key: 'next', label: 'Up Next' },
    ];

    let state = {
      view: 'loading',     // 'loading', 'picker', 'shows'
      members: [],
      shows: [],
      memberName: '',
      memberSlug: null,
      currentTab: 'watching',
      focusZone: 'tabs',   // 'tabs', 'list', 'picker'
      tabIndex: 0,
      listIndex: 0,
      pickerIndex: 0,
    };

    const app = document.getElementById('app');

    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function getFiltered() {
      return state.shows
        .filter(s => s.list === state.currentTab)
        .sort((a, b) => (parseFloat(b.rating) || 0) - (parseFloat(a.rating) || 0));
    }

    function render() {
      if (state.view === 'loading') {
        app.innerHTML = '<div class="empty">Loading...</div>';
        return;
      }

      if (state.view === 'picker') {
        app.innerHTML = `
          <div class="picker">
            <h1>Show Picker Club</h1>
            <div class="picker-list">
              ${state.members.map((h, i) =>
                `<div class="picker-item${i === state.pickerIndex ? ' focused' : ''}" onclick="selectMember('${h.slug}')">${escapeHtml(h.name)}</div>`
              ).join('')}
            </div>
          </div>`;
        return;
      }

      const filtered = getFiltered();
      const tabsHtml = TABS.map((t, i) => {
        let cls = 'tab';
        if (t.key === state.currentTab) cls += ' active';
        if (state.focusZone === 'tabs' && i === state.tabIndex) cls += ' focused';
        return `<div class="${cls}" onclick="clickTab(${i})">${t.label}</div>`;
      }).join('');

      const listHtml = filtered.length === 0
        ? '<div class="empty">No shows in this list.</div>'
        : filtered.map((show, i) => {
            const focused = state.focusZone === 'list' && i === state.listIndex;
            const rating = show.rating ? `<span class="show-rating"><span class="star">&#9733;</span>${escapeHtml(show.rating)}</span>` : '';
            const network = show.network ? `<span class="show-network">${escapeHtml(show.network)}</span>` : '';
            const via = show.recommended_by ? `<span class="show-via">via ${escapeHtml(show.recommended_by)}</span>` : '';
            const series = show.full_series ? '<span class="series-badge">&#127916;</span>' : '';
            const movie = show.movie ? ' <span class="show-movie">(Movie)</span>' : '';
            const notes = show.notes ? `<span class="show-notes">${escapeHtml(show.notes)}</span>` : '';

            return `<div class="show-row${focused ? ' focused' : ''}" id="row-${i}">
              <span class="show-title">${escapeHtml(show.title)}${movie}</span>
              <span class="show-meta">${series}${rating}${network}${via}${notes}</span>
            </div>`;
          }).join('');

      const count = filtered.length;

      app.innerHTML = `
        <header>
          <span style="color: rgba(255,255,255,0.4); font-size: 36px; cursor: pointer; margin-right: 16px;" onclick="goToPicker()" title="All members">&#9664;</span>
          <h1>${escapeHtml(state.memberName)}</h1>
          <div class="tabs">${tabsHtml}</div>
        </header>
        <div class="show-list" id="showList">${listHtml}</div>
        <div class="count-bar">${count} show${count !== 1 ? 's' : ''}</div>`;

      // Scroll focused row into view
      if (state.focusZone === 'list') {
        const row = document.getElementById(`row-${state.listIndex}`);
        if (row) row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    function goToPicker() {
      state.view = 'picker';
      state.focusZone = 'picker';
      history.pushState(null, '', '/tv');
      render();
    }

    function clickTab(i) {
      state.tabIndex = i;
      state.currentTab = TABS[i].key;
      state.focusZone = 'list';
      state.listIndex = 0;
      render();
    }

    async function selectMember(slug) {
      state.memberSlug = slug;
      const h = state.members.find(h => h.slug === slug);
      state.memberName = h ? h.name : slug;
      state.view = 'loading';
      render();

      const res = await fetch(`/api/shows?member=${slug}`);
      const data = await res.json();
      state.shows = data.shows || [];
      state.currentTab = 'watching';
      state.tabIndex = 0;
      state.listIndex = 0;
      state.focusZone = 'tabs';
      state.view = 'shows';
      history.pushState(null, '', `/tv/${slug}`);
      render();
    }

    document.addEventListener('keydown', (e) => {
      const key = e.key;

      if (state.view === 'picker') {
        if (key === 'ArrowDown') {
          state.pickerIndex = Math.min(state.pickerIndex + 1, state.members.length - 1);
          render();
        } else if (key === 'ArrowUp') {
          state.pickerIndex = Math.max(state.pickerIndex - 1, 0);
          render();
        } else if (key === 'Enter') {
          selectMember(state.members[state.pickerIndex].slug);
        }
        e.preventDefault();
        return;
      }

      if (state.view !== 'shows') return;
      const filtered = getFiltered();

      if (state.focusZone === 'tabs') {
        if (key === 'ArrowLeft') {
          state.tabIndex = Math.max(state.tabIndex - 1, 0);
          render();
        } else if (key === 'ArrowRight') {
          state.tabIndex = Math.min(state.tabIndex + 1, TABS.length - 1);
          render();
        } else if (key === 'ArrowDown' || key === 'Enter') {
          state.currentTab = TABS[state.tabIndex].key;
          state.focusZone = 'list';
          state.listIndex = 0;
          render();
        } else if (key === 'Escape' || key === 'Backspace') {
          // Go back to picker
          state.view = 'picker';
          state.focusZone = 'picker';
          history.pushState(null, '', '/tv');
          render();
        }
      } else if (state.focusZone === 'list') {
        if (key === 'ArrowDown') {
          state.listIndex = Math.min(state.listIndex + 1, filtered.length - 1);
          render();
        } else if (key === 'ArrowUp') {
          if (state.listIndex === 0) {
            state.focusZone = 'tabs';
            render();
          } else {
            state.listIndex--;
            render();
          }
        } else if (key === 'ArrowLeft') {
          state.tabIndex = Math.max(state.tabIndex - 1, 0);
          state.currentTab = TABS[state.tabIndex].key;
          state.listIndex = 0;
          render();
        } else if (key === 'ArrowRight') {
          state.tabIndex = Math.min(state.tabIndex + 1, TABS.length - 1);
          state.currentTab = TABS[state.tabIndex].key;
          state.listIndex = 0;
          render();
        } else if (key === 'Enter') {
          const show = filtered[state.listIndex];
          if (show && show.network_url) {
            window.open(show.network_url, '_blank');
          }
        } else if (key === 'Escape' || key === 'Backspace') {
          state.focusZone = 'tabs';
          render();
        }
      }
      e.preventDefault();
    });

    // Init
    (async function init() {
      const path = window.location.pathname.replace(/\/$/, '');
      const match = path.match(/^\/tv\/(.+)$/);

      const res = await fetch('/api/members');
      const data = await res.json();
      state.members = data.members || [];

      if (match) {
        await selectMember(match[1]);
      } else {
        state.view = 'picker';
        state.focusZone = 'picker';
        render();
      }
    })();
  </script>
</body>
</html>
