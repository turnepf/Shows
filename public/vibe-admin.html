<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Vibe trait fill</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { padding: 40px 20px; }
    .wrap { max-width: 720px; margin: 0 auto; background: var(--surface); padding: 28px; border-radius: 12px; box-shadow: 0 1px 2px oklch(0.18 0.03 50 / 0.06), 0 8px 28px oklch(0.18 0.03 50 / 0.06); }
    h1 { font-family: var(--font-display); font-size: var(--text-lg); font-weight: 600; color: var(--ink); margin-bottom: 8px; }
    p.sub { color: var(--ink-muted); font-size: var(--text-sm); margin-bottom: 20px; }
    label { display: block; font-size: var(--text-sm); font-weight: 500; margin-bottom: 6px; margin-top: 14px; color: var(--ink-muted); }
    input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: var(--text-base); font-family: inherit; }
    input:focus { outline: none; border-color: var(--accent); }
    button { width: 100%; margin-top: 24px; padding: 12px; background: var(--accent); color: var(--ink); border: none; border-radius: 6px; font-size: var(--text-base); font-weight: 700; cursor: pointer; }
    button:hover { background: var(--accent-hover); }
    button:disabled { background: var(--ink-faint); cursor: not-allowed; }
    .progress { margin-top: 20px; padding: 14px; border-radius: 6px; background: var(--surface-2); font-size: var(--text-sm); line-height: 1.6; }
    .progress strong { color: var(--ink); }
    .log-toolbar { display: flex; justify-content: flex-end; margin-top: 10px; }
    button.copy { width: auto; margin: 0; padding: 6px 12px; font-size: var(--text-xs); background: var(--ink); }
    button.copy:hover { background: oklch(0.18 0.025 50); }
    .log { margin-top: 6px; max-height: 300px; overflow-y: auto; font-family: var(--font-mono); font-size: var(--text-xs); background: var(--surface-2); padding: 10px; border-radius: 6px; }
    .log-row { padding: 2px 0; }
    .log-row.ok { color: oklch(0.42 0.13 150); }
    .log-row.unknown { color: oklch(0.55 0.14 80); }
    .log-row.error { color: var(--danger-deep); }
    .err { color: var(--danger-deep); font-size: var(--text-sm); margin-top: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Vibe trait fill</h1>
    <p class="sub">Generates trait scores for any show that doesn't have them yet. Calls Claude one batch at a time until all caught up.</p>

    <div id="authWarn" style="display:none;margin-bottom:14px;padding:10px;background:var(--danger-soft);border:1px solid color-mix(in oklch, var(--danger) 30%, transparent);border-radius:6px;color:var(--danger-deep);font-size:13px;">Log in as the operator first at <a href="/patrick">showpicker.club/patrick</a> (tap Edit, enter your code), then reload this page.</div>

    <label>Batch size (max 8)</label>
    <input type="number" id="batchSize" value="5" min="1" max="8">

    <button id="runBtn" onclick="run()">Run until done</button>

    <div class="progress" id="progress" style="display:none;">
      <div><strong>Processed:</strong> <span id="processed">0</span> &middot; <strong>Unknown:</strong> <span id="unknown">0</span> &middot; <strong>Errors:</strong> <span id="errors">0</span> &middot; <strong>Remaining:</strong> <span id="remaining">?</span></div>
      <div class="log-toolbar"><button type="button" class="copy" id="copyLogBtn" onclick="copyLog()">Copy summary + log</button></div>
      <div class="log" id="log"></div>
    </div>
  </div>

  <script>
    // Gated by the operator's session cookie — no secret to enter.
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const r = await fetch('/auth/check');
        const d = await r.json();
        if (!d.authenticated) document.getElementById('authWarn').style.display = '';
      } catch {}
    });

    let totals = { processed: 0, unknown: 0, errors: 0 };

    async function copyLog() {
      const summary = `Processed: ${document.getElementById('processed').textContent} · Unknown: ${document.getElementById('unknown').textContent} · Errors: ${document.getElementById('errors').textContent} · Remaining: ${document.getElementById('remaining').textContent}`;
      const lines = Array.from(document.querySelectorAll('#log .log-row')).map(el => el.textContent);
      const blob = [summary, ...lines].join('\n');
      const btn = document.getElementById('copyLogBtn');
      try {
        await navigator.clipboard.writeText(blob);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = blob;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
      }
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = orig; }, 1500);
    }

    function appendLog(rows) {
      const log = document.getElementById('log');
      rows.forEach(r => {
        const div = document.createElement('div');
        div.className = 'log-row ' + r.status;
        let line = `${r.title}: ${r.status}`;
        if (r.error) line += ` (${r.error})`;
        div.textContent = line;
        log.appendChild(div);
      });
      log.scrollTop = log.scrollHeight;
    }

    async function run() {
      const count = parseInt(document.getElementById('batchSize').value, 10) || 5;
      const btn = document.getElementById('runBtn');

      totals = { processed: 0, unknown: 0, errors: 0 };
      document.getElementById('log').innerHTML = '';
      document.getElementById('progress').style.display = 'block';
      document.getElementById('processed').textContent = '0';
      document.getElementById('unknown').textContent = '0';
      document.getElementById('errors').textContent = '0';
      document.getElementById('remaining').textContent = '?';

      btn.disabled = true;
      btn.textContent = 'Running…';

      let consecutiveErrors = 0;
      while (true) {
        try {
          const res = await fetch('/api/admin-vibe-fill', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ count }),
          });
          const data = await res.json();
          if (!res.ok) {
            if (res.status === 403) document.getElementById('authWarn').style.display = '';
            alert('Error: ' + (data.error || res.status));
            break;
          }
          totals.processed += data.processed;
          totals.unknown += data.unknown;
          totals.errors += data.errors;
          document.getElementById('processed').textContent = totals.processed;
          document.getElementById('unknown').textContent = totals.unknown;
          document.getElementById('errors').textContent = totals.errors;
          document.getElementById('remaining').textContent = data.remaining;
          appendLog(data.results || []);

          // Stop conditions: nothing returned (done), or repeated 0-progress batches.
          if (!data.results || data.results.length === 0) break;
          if (data.processed === 0 && data.unknown === 0) {
            consecutiveErrors++;
            if (consecutiveErrors >= 2) { alert('All recent shows errored. Check the logs above.'); break; }
          } else {
            consecutiveErrors = 0;
          }
          if (data.remaining <= 0) break;
        } catch (e) {
          alert('Network error: ' + e.message);
          break;
        }
      }

      btn.disabled = false;
      btn.textContent = 'Run until done';
    }
  </script>
</body>
</html>
