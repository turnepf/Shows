<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Vibe trait fill</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FBF5EB; color: #2C2C2C; min-height: 100vh; padding: 40px 20px;
    }
    .wrap { max-width: 720px; margin: 0 auto; background: #fff; padding: 28px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    h1 { font-size: 20px; margin-bottom: 8px; color: #2C3E50; }
    p.sub { color: #888; font-size: 13px; margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; margin-top: 14px; color: #555; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; font-family: inherit; }
    input:focus { outline: none; border-color: #E67E22; }
    button { width: 100%; margin-top: 24px; padding: 12px; background: #E67E22; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; }
    button:hover { background: #d35400; }
    button:disabled { background: #bbb; cursor: not-allowed; }
    .progress { margin-top: 20px; padding: 14px; border-radius: 6px; background: #f5f1e8; font-size: 13px; line-height: 1.6; }
    .progress strong { color: #2C3E50; }
    .log-toolbar { display: flex; justify-content: flex-end; margin-top: 10px; }
    button.copy { width: auto; margin: 0; padding: 6px 12px; font-size: 12px; background: #2C3E50; }
    button.copy:hover { background: #1a252f; }
    .log { margin-top: 6px; max-height: 300px; overflow-y: auto; font-family: ui-monospace, monospace; font-size: 12px; background: #fdfaf2; padding: 10px; border-radius: 6px; }
    .log-row { padding: 2px 0; }
    .log-row.ok { color: #1b5e20; }
    .log-row.unknown { color: #b8860b; }
    .log-row.error { color: #b71c1c; }
    .err { color: #b71c1c; font-size: 13px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Vibe trait fill</h1>
    <p class="sub">Generates trait scores for any show that doesn't have them yet. Calls Claude one batch at a time until all caught up.</p>

    <label>Admin secret</label>
    <input type="password" id="secret" autocomplete="off" required>

    <label>Batch size (max 8)</label>
    <input type="number" id="batchSize" value="5" min="1" max="8">

    <button id="runBtn" onclick="run()">Run until done</button>

    <div class="progress" id="progress" style="display:none;">
      <div><strong>Processed:</strong> <span id="processed">0</span> &middot; <strong>Unknown:</strong> <span id="unknown">0</span> &middot; <strong>Errors:</strong> <span id="errors">0</span> &middot; <strong>Remaining:</strong> <span id="remaining">?</span></div>
      <div class="log-toolbar"><button type="button" class="copy" id="copyLogBtn" onclick="copyLog()">Copy summary + log</button></div>
      <div class="log" id="log"></div>
    </div>
  </div>

  <script>
    const SECRET_STORE_KEY = 'admin_secret_remember';
    const SECRET_TTL_MS = 30 * 86400000;

    function loadSavedSecret() {
      try {
        const raw = localStorage.getItem(SECRET_STORE_KEY);
        if (!raw) return;
        const obj = JSON.parse(raw);
        if (obj && obj.expires > Date.now() && obj.secret) {
          document.getElementById('secret').value = obj.secret;
        } else {
          localStorage.removeItem(SECRET_STORE_KEY);
        }
      } catch {}
    }
    function rememberSecret(secret) {
      try {
        localStorage.setItem(SECRET_STORE_KEY, JSON.stringify({ secret, expires: Date.now() + SECRET_TTL_MS }));
      } catch {}
    }
    function forgetSecret() {
      try { localStorage.removeItem(SECRET_STORE_KEY); } catch {}
    }
    document.addEventListener('DOMContentLoaded', loadSavedSecret);

    let totals = { processed: 0, unknown: 0, errors: 0 };

    async function copyLog() {
      const summary = `Processed: ${document.getElementById('processed').textContent} · Unknown: ${document.getElementById('unknown').textContent} · Errors: ${document.getElementById('errors').textContent} · Remaining: ${document.getElementById('remaining').textContent}`;
      const lines = Array.from(document.querySelectorAll('#log .log-row')).map(el => el.textContent);
      const blob = [summary, ...lines].join('\n');
      const btn = document.getElementById('copyLogBtn');
      try {
        await navigator.clipboard.writeText(blob);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = blob;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
      }
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = orig; }, 1500);
    }

    function appendLog(rows) {
      const log = document.getElementById('log');
      rows.forEach(r => {
        const div = document.createElement('div');
        div.className = 'log-row ' + r.status;
        let line = `${r.title} — ${r.status}`;
        if (r.error) line += ` (${r.error})`;
        div.textContent = line;
        log.appendChild(div);
      });
      log.scrollTop = log.scrollHeight;
    }

    async function run() {
      const secret = document.getElementById('secret').value;
      const count = parseInt(document.getElementById('batchSize').value, 10) || 5;
      const btn = document.getElementById('runBtn');
      if (!secret) { alert('Need the admin secret'); return; }

      totals = { processed: 0, unknown: 0, errors: 0 };
      document.getElementById('log').innerHTML = '';
      document.getElementById('progress').style.display = 'block';
      document.getElementById('processed').textContent = '0';
      document.getElementById('unknown').textContent = '0';
      document.getElementById('errors').textContent = '0';
      document.getElementById('remaining').textContent = '?';

      btn.disabled = true;
      btn.textContent = 'Running…';

      let consecutiveErrors = 0;
      let firstSuccessSaved = false;
      while (true) {
        try {
          const res = await fetch('/api/admin-vibe-fill', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ secret, count }),
          });
          const data = await res.json();
          if (!res.ok) {
            if (res.status === 401) forgetSecret();
            alert('Error: ' + (data.error || res.status));
            break;
          }
          if (!firstSuccessSaved) { rememberSecret(secret); firstSuccessSaved = true; }
          totals.processed += data.processed;
          totals.unknown += data.unknown;
          totals.errors += data.errors;
          document.getElementById('processed').textContent = totals.processed;
          document.getElementById('unknown').textContent = totals.unknown;
          document.getElementById('errors').textContent = totals.errors;
          document.getElementById('remaining').textContent = data.remaining;
          appendLog(data.results || []);

          // Stop conditions: nothing returned (done), or repeated 0-progress batches.
          if (!data.results || data.results.length === 0) break;
          if (data.processed === 0 && data.unknown === 0) {
            consecutiveErrors++;
            if (consecutiveErrors >= 2) { alert('All recent shows errored. Check the logs above.'); break; }
          } else {
            consecutiveErrors = 0;
          }
          if (data.remaining <= 0) break;
        } catch (e) {
          alert('Network error: ' + e.message);
          break;
        }
      }

      btn.disabled = false;
      btn.textContent = 'Run until done';
    }
  </script>
</body>
</html>
